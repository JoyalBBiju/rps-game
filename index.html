<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Stone Paper Scissors</h1>
        
        <div class="score-board">
            <div class="score">
                <h3>Your Score</h3>
                <p id="userScore">0</p>
            </div>
            <div class="score">
                <h3>Computer Score</h3>
                <p id="computerScore">0</p>
            </div>
        </div>

        <div class="game-area">
            <h2 id="result">Make Your Move!</h2>
            
            <div class="choices">
                <button class="choice-btn" id="stone" onclick="playGame('stone')">
                    🪨<br>Stone
                </button>
                <button class="choice-btn" id="paper" onclick="playGame('paper')">
                    📄<br>Paper
                </button>
                <button class="choice-btn" id="scissors" onclick="playGame('scissors')">
                    ✂️<br>Scissors
                </button>
            </div>

            <div class="moves">
                <div class="move">
                    <h3>Your Choice</h3>
                    <p id="userChoice">-</p>
                </div>
                <div class="move">
                    <h3>Computer's Choice</h3>
                    <p id="computerChoice">-</p>
                </div>
            </div>

            <button class="reset-btn" onclick="resetGame()">Reset Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
